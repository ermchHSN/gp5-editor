<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>GP5 Studio - Minimalist</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --apple-bg: #000000;
            --apple-card: #1c1c1e;
            --apple-blue: #007aff;
            --apple-text: #ffffff;
        }
        body { background-color: var(--apple-bg); color: var(--apple-text); font-family: -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
        .top-nav { background: rgba(28, 28, 30, 0.7); backdrop-filter: blur(20px); border-bottom: 0.5px solid #38383a; position: sticky; top: 0; z-index: 1000; padding: 12px 20px; }
        .btn-apple { background: var(--apple-blue); border: none; border-radius: 10px; color: white; padding: 8px 20px; font-weight: 600; }
        .live-on-container { background: linear-gradient(145deg, #007aff, #0056b3); border-radius: 24px; padding: 60px 20px; text-align: center; margin: 20px 0; box-shadow: 0 15px 35px rgba(0, 122, 255, 0.3); }
        #live_number { font-size: 100px; font-weight: 800; line-height: 1; display: block; }
        #live_name { font-size: 32px; font-weight: 300; letter-spacing: 5px; }
        .effect-node { background: var(--apple-card); border-radius: 18px; padding: 15px; text-align: center; border: 2px solid transparent; transition: 0.2s; }
        .border-light { border-color: var(--apple-blue) !important; box-shadow: 0 0 15px rgba(0, 122, 255, 0.4); }
        .img-effect { max-width: 46px !important; }
        .card { background-color: var(--apple-card); border: none; border-radius: 20px; }
        footer, .buymeacoffee { display: none !important; }
    </style>
</head>
<body>
    <nav class="top-nav d-flex justify-content-between align-items-center">
        <button id="btn_connect" class="btn-apple">Connect GP-5</button>
        <div id="status_text" class="small text-secondary">Disconnected</div>
        <div class="d-flex align-items-center gap-3">
            <select id="listPatches" class="form-select form-select-sm lockable" style="width: 150px; background: #2c2c2e; color: white; border:none;" disabled></select>
            <div class="form-check form-switch"><input class="form-check-input lockable" type="checkbox" role="switch" id="live_switch" disabled></div>
        </div>
    </nav>

    <div class="container py-4">
        <div id="screen_live">
            <div id="live_view_container" class="live-on d-none">
                <div class="live-on-container">
                    <span id="live_number">00</span>
                    <span id="live_name">GP-5</span>
                </div>
            </div>
            
            <div id="btn_list" class="row row-cols-2 row-cols-md-5 g-3 mb-4 live-off">
                <div id="order_0" data-order="0" class="col"><div class="effect-node"><button id="nr_button" data-card="nr_card" class="btn btn-link p-0 lockable btn-effects btn-blocks" disabled>NR</button></div></div>
                <div id="order_1" data-order="1" class="col"><div class="effect-node"><button id="pre_button" data-card="pre_card" class="btn btn-link p-0 lockable btn-effects btn-blocks" disabled>PRE</button></div></div>
                <div id="order_2" data-order="2" class="col"><div class="effect-node"><button id="dst_button" data-card="dst_card" class="btn btn-link p-0 lockable btn-effects btn-blocks" disabled>DST</button></div></div>
                <div id="order_3" data-order="3" class="col"><div class="effect-node"><button id="amp_button" data-card="amp_card" class="btn btn-link p-0 lockable btn-effects btn-blocks" disabled>AMP</button></div></div>
                <div id="order_4" data-order="4" class="col"><div class="effect-node"><button id="cab_button" data-card="cab_card" class="btn btn-link p-0 lockable btn-effects btn-blocks" disabled>CAB</button></div></div>
            </div>
        </div>

        <!-- Controles dinámicos -->
        <div class="row live-off">
            <div id="nr_card" class="col-12 effects_card">
                <div class="card p-4">
                    <h5>Noise Reduction</h5>
                    <input type="range" class="form-range lockable" id="nr_p0_value" data-effect="0" data-param="0">
                    <div class="text-end fw-bold" id="nr_p0_output">10</div>
                </div>
            </div>
        </div>

        <div class="card p-4 mt-4">
            <label class="small text-secondary mb-2">OUTPUT VOLUME</label>
            <input type="range" id="global_vol_value" class="form-range lockable" min="0" max="100" disabled>
            <button id="btn_save_patch" class="btn-apple mt-3" style="background:#34c759" disabled>SAVE CHANGES</button>
        </div>
    </div>

    <script>
        // MOTOR ORIGINAL GP-5 REINTEGRADO
        const gui = {};
        const elements_gui = document.querySelectorAll('*[id]');
        elements_gui.forEach(element => { gui[element.id] = element; });

        // Inyectar iconos SVG originales
        gui.nr_button.innerHTML = `<img class="img-effect" src="data:image/svg+xml,%3Csvg%20viewBox%3D%220%200%20192%20250%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%3E%3Cpath%20d%3D%22M191.667%20117.844v18.478c0%205.25-4.262%209.511-9.511%209.511H9.511c-5.249%200-9.511-4.261-9.511-9.511v-18.478c0-5.249%204.262-9.511%209.511-9.511h172.645c5.249%200%209.511%204.262%209.511%209.511%22%20style%3D%22fill%3A%23bdbdbd%22%2F%3E%3Cpath%20d%3D%22M179.167%2016.908v216.184c0%209.332-7.577%2016.908-16.909%2016.908H29.408c-9.332%200-16.908-7.576-16.908-16.908V16.908C12.5%207.576%2020.076%200%2029.408%200h132.85c9.332%200%2016.909%207.576%2016.909%2016.908%22%20style%3D%22fill%3A%23dcdcdc%22%2F%3E%3C/svg%3E"> <div class="small fw-bold mt-1 text-white">NR</div>`;
        // ... (Repetir para pre_button, dst_button, etc. con sus SVG)

        let device, writeChar;
        const SERVICE_UUID = '03b80e5a-ede8-4b33-a751-6ce34ec4c700';
        const CHARACTERISTIC_UUID = '7772e5db-3868-4112-a1a9-f2669d106bf3';

        gui.btn_connect.onclick = async () => {
            try {
                device = await navigator.bluetooth.requestDevice({ filters: [{ services: [SERVICE_UUID] }] });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                writeChar = await service.getCharacteristic(CHARACTERISTIC_UUID);
                gui.status_text.innerText = "Connected to " + device.name;
                document.querySelectorAll('.lockable').forEach(el => el.disabled = false);
            } catch (err) { gui.status_text.innerText = "Error: " + err; }
        };

        gui.live_switch.onchange = () => {
            const liveon = document.querySelectorAll('.live-on');
            const liveoff = document.querySelectorAll('.live-off');
            if (gui.live_switch.checked){
                liveon.forEach(e => e.classList.remove('d-none'));
                liveoff.forEach(e => e.classList.add('d-none'));
            } else {
                liveon.forEach(e => e.classList.add('d-none'));
                liveoff.forEach(e => e.classList.remove('d-none'));
            }
        }
    </script>
</body>
</html>
