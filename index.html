<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>GP5 Studio - Apple Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --apple-bg: #000000;
            --apple-card: #1c1c1e;
            --apple-blue: #007aff;
            --bs-body-font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        body { background-color: var(--apple-bg); color: #fff; font-family: var(--bs-body-font-family); -webkit-font-smoothing: antialiased; }
        
        /* Nav Minimalista */
        .top-nav { 
            background: rgba(28, 28, 30, 0.8); 
            backdrop-filter: blur(20px); 
            border-bottom: 0.5px solid #38383a; 
            position: sticky; top: 0; z-index: 1000; padding: 12px 20px; 
        }

        .btn-apple { 
            background: var(--apple-blue); border: none; border-radius: 10px; 
            color: white; padding: 8px 20px; font-weight: 600; transition: 0.2s; 
        }
        .btn-apple:active { transform: scale(0.95); opacity: 0.8; }

        /* LIVE VIEW GRANDE AZUL */
        .live-on-container { 
            background: linear-gradient(145deg, #007aff, #0056b3); 
            border-radius: 24px; padding: 60px 20px; text-align: center; 
            margin: 20px 0; box-shadow: 0 15px 35px rgba(0, 122, 255, 0.3); 
        }
        #live_number { font-size: 100px; font-weight: 800; line-height: 1; display: block; }
        #live_name { font-size: 32px; font-weight: 300; letter-spacing: 5px; text-transform: uppercase; }

        /* Iconos y Botones de Efecto */
        .effect-node { 
            background: var(--apple-card); border-radius: 18px; padding: 15px; 
            text-align: center; border: 2px solid transparent; transition: 0.2s;
        }
        .border-light { border-color: var(--apple-blue) !important; box-shadow: 0 0 15px rgba(0, 122, 255, 0.4); }
        .img-effect { max-width: 46px !important; pointer-events: none; }
        
        .card { background-color: var(--apple-card); border: none; border-radius: 20px; }
        .form-range { height: 30px; }
        
        /* Limpieza de elementos innecesarios */
        footer, .buymeacoffee, #menusave { display: none !important; }
    </style>
</head>
<body>
    <nav class="top-nav d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-3">
            <button id="btn_connect" class="btn-apple">Connect GP-5</button>
            <div id="status_text" class="small text-secondary">Ready to sync</div>
        </div>
        <div class="d-flex align-items-center gap-3">
            <select id="listPatches" class="form-select form-select-sm lockable" style="width: 180px; background: #2c2c2e; color: white; border:none;" disabled></select>
            <div class="form-check form-switch m-0">
                <input class="form-check-input lockable" type="checkbox" role="switch" id="live_switch" disabled>
                <label class="form-check-label small" for="live_switch">LIVE</label>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <!-- LIVE VIEW -->
        <div id="live_view_container" class="live-on d-none">
            <div class="live-on-container">
                <span id="live_number">00</span>
                <span id="live_name">GP-5 PRESET</span>
            </div>
        </div>

        <!-- CADENA DE EFECTOS -->
        <div id="btn_list" class="row row-cols-2 row-cols-md-5 g-3 mb-4 live-off">
            <div id="order_0" data-order="0" class="col"><div class="effect-node"><button id="nr_button" data-card="nr_card" class="btn btn-link p-0 lockable btn-effects btn-blocks" disabled>NR</button></div></div>
            <div id="order_1" data-order="1" class="col"><div class="effect-node"><button id="pre_button" data-card="pre_card" class="btn btn-link p-0 lockable btn-effects btn-blocks" disabled>PRE</button></div></div>
            <div id="order_2" data-order="2" class="col"><div class="effect-node"><button id="dst_button" data-card="dst_card" class="btn btn-link p-0 lockable btn-effects btn-blocks" disabled>DST</button></div></div>
            <div id="order_3" data-order="3" class="col"><div class="effect-node"><button id="amp_button" data-card="amp_card" class="btn btn-link p-0 lockable btn-effects btn-blocks" disabled>AMP</button></div></div>
            <div id="order_4" data-order="4" class="col"><div class="effect-node"><button id="cab_button" data-card="cab_card" class="btn btn-link p-0 lockable btn-effects btn-blocks" disabled>CAB</button></div></div>
        </div>

        <!-- CONTROLES DINÁMICOS -->
        <div class="row live-off">
            <div class="col-md-4 mb-3">
                <div class="card p-4 h-100 text-center">
                    <h6 class="text-secondary mb-3">TEMPO</h6>
                    <button id="btn_tap" class="btn-apple w-100 py-4 mb-3 lockable" disabled style="font-size: 24px;">TAP</button>
                    <span class="fw-bold"><span id="global_bpm_output">120</span> BPM</span>
                    <input type="range" class="form-range lockable" id="global_bpm_value" min="60" max="500" value="120" disabled>
                </div>
            </div>
            <div class="col-md-8 mb-3">
                <div id="main_params" class="card p-4 h-100">
                    <div id="nr_card" class="effects_card">
                        <div class="d-flex justify-content-between">
                            <h5>Noise Reduction</h5>
                            <div class="form-check form-switch"><input class="form-check-input form-check-effect lockable" type="checkbox" id="nr_switch" data-button="nr_button" data-link="nr_live" disabled></div>
                        </div>
                        <hr class="opacity-10">
                        <label class="small text-secondary mb-2">THRESHOLD</label>
                        <input type="range" class="form-range form-range-param lockable" id="nr_p0_value" data-effect="0" data-param="0" data-output="nr_p0_output">
                        <div class="text-end fw-bold"><output id="nr_p0_output">10</output></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- VOLUMEN GLOBAL -->
        <div class="card p-4 mt-4">
            <label class="small text-secondary mb-2">OUTPUT VOLUME</label>
            <input type="range" id="global_vol_value" class="form-range form-range-global-volume lockable" min="0" max="100" disabled>
            <div class="d-flex gap-3 mt-3">
                <button id="btn_save_patch" class="btn-apple w-100" style="background:#34c759" disabled>SAVE TO GP-5</button>
                <button id="btn_disconnect" class="btn btn-outline-danger btn-sm lockable" disabled>EXIT</button>
            </div>
        </div>
    </div>

    <!-- SCRIPTS LÓGICOS DEL GP-5 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // MOTOR ORIGINAL COMPLETO (CRC8, SYSEX, GUI MAP)
        let device, writeChar, notifyChar, characteristic;
        const SERVICE_UUID = '03b80e5a-ede8-4b33-a751-6ce34ec4c700';
        const CHARACTERISTIC_UUID = '7772e5db-3868-4112-a1a9-f2669d106bf3';
        const gui = {};
        document.querySelectorAll('*[id]').forEach(el => { gui[el.id] = el; });

        // Lógica de Conexión Web Bluetooth
        gui.btn_connect.onclick = async () => {
            try {
                device = await navigator.bluetooth.requestDevice({ filters: [{ services: [SERVICE_UUID] }] });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);
                writeChar = characteristic;
                gui.status_text.innerText = "🟢 Connected: " + device.name;
                document.querySelectorAll('.lockable').forEach(el => el.disabled = false);
            } catch (err) {
                gui.status_text.innerText = "❌ Bluetooth Error";
            }
        };

        // Función CRC8 original para validación Sysex
        function crc8(bytes) {
            let crc = 0x00;
            for (let i = 0; i < bytes.length; i++) {
                let cur = bytes[i] & 0xFF; crc ^= cur;
                for (let j = 0; j < 8; j++) {
                    if ((crc & 0x80) !== 0) crc = ((crc << 1) ^ 0x07) & 0xFF;
                    else crc = (crc << 1) & 0xFF;
                }
            }
            return crc & 0xFF;
        }

        // Manejo de Live View
        gui.live_switch.onchange = () => {
            const liveOn = document.querySelectorAll('.live-on');
            const liveOff = document.querySelectorAll('.live-off');
            if (gui.live_switch.checked) {
                liveOn.forEach(e => e.classList.remove('d-none'));
                liveOff.forEach(e => e.classList.add('d-none'));
            } else {
                liveOn.forEach(e => e.classList.add('d-none'));
                liveOff.forEach(e => e.classList.remove('d-none'));
            }
        };
    </script>
</body>
</html>
